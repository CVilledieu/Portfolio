{{block "index" . }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>My Portfolio</title>
</head>
<body >
    <div class="pageContainer">
        <div>
            <div class="header">
                <div id="welcome">{{template "welcome banner"}}</div>
                <div id="logo">{{template "logo"}}</div>
            </div>
            <div class="core">
                {{template "core"}}
            </div>
        </div>
    </div>
</body>
</html>
{{end}}

{{define "welcome banner"}}
    <h1>Hello! I'm Chris, a back-end developer!</h1>
{{end}}



{{define "logo"}}
    <di>Logo!</di>
{{end}}
